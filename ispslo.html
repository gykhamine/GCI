<!DOCTYPE html>

    <title>Page d'Archives de Liens</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('1.jpg'); /* Remplace avec ton image de fond */
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        h1 {
            text-align: center;
            font-size: 50px;
            margin-top: 30px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.7);
        }

        img {
            width: 300px;
            height: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .archive-container {
            margin-top: 0px;
            padding: 0px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50px;
            display: inline-block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .links a {
            text-decoration: none;font-size: 24px;
            font-weight: bold;
            color: white;
            background-image: linear-gradient(to right, green, blue, red, white);
            -webkit-background-clip: text;
            background-clip: text;
            transition: transform 0.3s ease, color 0.3s ease;
            padding: 10px;
            display: inline-block;
        }

        .links a:hover {
            transform: scale(1.1);
            color: red;
        }

        .links a:active {
            transform: scale(0.9);
            color: blue;
        }
    </style>
</head>
